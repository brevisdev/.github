name: Auto Approve

on:
  workflow_call:
    secrets:
      PR_REVIEW_PAT:
        required: true

jobs:
  approve:
    runs-on: self-hosted
    steps:
      - run: gh pr review ${{ github.event.pull_request.number }} --approve --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.PR_REVIEW_PAT }}