name: Checkout
description: Checkout repository code

inputs:
  ref:
    description: Branch or commit to checkout
    required: false
    default: ''

runs:
  using: composite
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ inputs.ref }}
