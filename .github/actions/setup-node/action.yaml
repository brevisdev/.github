name: Setup Node.js
description: Setup Node.js runtime

inputs:
  node-version:
    description: Node.js version
    required: false
    default: '24.x'

runs:
  using: composite
  steps:
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: ${{ inputs.node-version }}
